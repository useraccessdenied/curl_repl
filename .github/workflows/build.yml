name: Build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

env:
  CURL_VERSION: 8.13.0

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux native ---
          - name: linux-x86_64
            os: ubuntu-latest
            target_arch: x86_64-linux-gnu
            build_type: native
            suffix: ""

          # --- Linux cross-compiled (build libcurl from source) ---
          - name: linux-i686
            os: ubuntu-latest
            target_arch: i686-linux-gnu
            build_type: cross
            cc_pkg: gcc-i686-linux-gnu
            suffix: ""

          - name: linux-aarch64
            os: ubuntu-latest
            target_arch: aarch64-linux-gnu
            build_type: cross
            cc_pkg: gcc-aarch64-linux-gnu
            suffix: ""

          - name: linux-arm
            os: ubuntu-latest
            target_arch: arm-linux-gnueabihf
            build_type: cross
            cc_pkg: gcc-arm-linux-gnueabihf
            suffix: ""

          # --- macOS universal ---
          - name: macos-universal
            os: macos-latest
            target_arch: macos-universal
            build_type: macos
            suffix: ""

          # --- Windows (cross-compiled from Linux with mingw-w64) ---
          - name: windows-x86_64
            os: ubuntu-latest
            target_arch: x86_64-w64-mingw32
            build_type: mingw
            cc_pkg: gcc-mingw-w64-x86-64
            suffix: .exe

          - name: windows-i686
            os: ubuntu-latest
            target_arch: i686-w64-mingw32
            build_type: mingw
            cc_pkg: gcc-mingw-w64-i686
            suffix: .exe

    steps:
      - uses: actions/checkout@v4

      # --- Native Linux ---
      - name: Install Linux native deps
        if: matrix.build_type == 'native'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcurl4-openssl-dev pkg-config

      # --- Cross-compiled Linux (build libcurl from source) ---
      - name: Install Linux cross deps and build libcurl
        if: matrix.build_type == 'cross'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.cc_pkg }} make
          cd /tmp
          curl -sL "https://curl.se/download/curl-${CURL_VERSION}.tar.gz" | tar xz
          cd "curl-${CURL_VERSION}"
          ./configure --host=${{ matrix.target_arch }} \
            --disable-shared --enable-static \
            --without-ssl --without-libssh2 --without-nghttp2 \
            --without-libpsl --without-zstd --without-brotli \
            --without-zlib --without-libidn2 \
            --disable-dict --disable-file --disable-ftp --disable-gopher \
            --disable-imap --disable-ldap --disable-mqtt --disable-pop3 \
            --disable-rtsp --disable-smb --disable-smtp --disable-telnet \
            --disable-tftp --disable-versioned-symbols \
            --prefix=/usr/${{ matrix.target_arch }}
          make -j$(nproc)
          sudo make install
          rm -rf /tmp/curl-${CURL_VERSION}
          echo "PKG_CONFIG_PATH=/usr/${{ matrix.target_arch }}/lib/pkgconfig" >> "$GITHUB_ENV"
        env:
          CURL_VERSION: ${{ env.CURL_VERSION }}

      # --- macOS ---
      - name: Install macOS deps
        if: matrix.build_type == 'macos'
        run: brew install curl

      # --- mingw-w64 (build libcurl from source) ---
      - name: Install mingw deps and build libcurl
        if: matrix.build_type == 'mingw'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.cc_pkg }} make
          cd /tmp
          curl -sL "https://curl.se/download/curl-${CURL_VERSION}.tar.gz" | tar xz
          cd "curl-${CURL_VERSION}"
          ./configure --host=${{ matrix.target_arch }} \
            --disable-shared --enable-static \
            --without-ssl --without-libssh2 --without-nghttp2 \
            --without-libpsl --without-zstd --without-brotli \
            --without-zlib --without-libidn2 \
            --disable-dict --disable-file --disable-ftp --disable-gopher \
            --disable-imap --disable-ldap --disable-mqtt --disable-pop3 \
            --disable-rtsp --disable-smb --disable-smtp --disable-telnet \
            --disable-tftp --disable-versioned-symbols \
            --prefix=/usr/${{ matrix.target_arch }}
          make -j$(nproc)
          sudo make install
          rm -rf /tmp/curl-${CURL_VERSION}
          echo "PKG_CONFIG_PATH=/usr/${{ matrix.target_arch }}/lib/pkgconfig" >> "$GITHUB_ENV"
        env:
          CURL_VERSION: ${{ env.CURL_VERSION }}

      # --- Build steps ---
      - name: Build (native Linux)
        if: matrix.build_type == 'native'
        run: |
          make
          mv ${{ github.event.repository.name }} \
             ${{ github.event.repository.name }}-${{ matrix.target_arch }}

      - name: Build (cross Linux)
        if: matrix.build_type == 'cross'
        run: |
          make cross TARGET_ARCH=${{ matrix.target_arch }}
          mv ${{ github.event.repository.name }} \
             ${{ github.event.repository.name }}-${{ matrix.target_arch }}

      - name: Build (macOS universal)
        if: matrix.build_type == 'macos'
        run: |
          make macos-universal
          mv ${{ github.event.repository.name }} \
             ${{ github.event.repository.name }}-${{ matrix.target_arch }}

      - name: Build (mingw)
        if: matrix.build_type == 'mingw'
        run: |
          # CURL_STATICLIB needed on Windows to avoid __imp_ symbol prefix
          make cross TARGET_ARCH=${{ matrix.target_arch }} \
            CFLAGS_EXTRA=-DCURL_STATICLIB
          mv ${{ github.event.repository.name }}.exe \
             ${{ github.event.repository.name }}-${{ matrix.target_arch }}.exe

      # --- Upload artifact ---
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.name }}
          path: ${{ github.event.repository.name }}-${{ matrix.target_arch }}${{ matrix.suffix }}
          if-no-files-found: error

      # --- Attach to release ---
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ github.event.repository.name }}-${{ matrix.target_arch }}${{ matrix.suffix }}" \
            --clobber
